<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report</title>
    <link href="{{url_for('static',filename='bootstrap-5.3.0-alpha3-dist/css/bootstrap.min.css')}}" rel="stylesheet" type="text/css">
</head>
<body style="background-image: url('static/Images/output-1.jpg');background-size: cover;" class="container-fluid">
    <!--Authentication message-->
    {% for message in get_flashed_messages() %}
    <div class="alert alert-success mb-0" role="alert">
      <button type="button" class="close" data-bs-dismiss="alert" aria-label="Close">
        <span aria-hidden="true">&times;</span>
      </button>
      <strong>{{ message }}</strong>
    </div>
    {% endfor %}
    <div class="row g-3 p-2 position-absolute top-50 start-50 translate-middle bg-dark bg-gradient bg-opacity-75 border rounded-top" style="display: flex;">
        <h2 class="bg-white rounded-pill" style="text-align: center;">{{disease}} Report</h2>
        <div class="col-md-4" style="display: flex;">
            <img src="{{url_for('static',filename='Images/bg-3.jpg')}}" alt="..." style="background-size: cover;width: 100%;height: auto;background-position: center;background-repeat: no-repeat;">
        </div>
        <div class="col-md-8 text-white">
            <div>
                <h5>Patient's Id : {{id_}}</h5>
                <h5>Name : {{name}}</h5>
                <h5>Age : {{age}}</h5>
                <h5>Gender : {{gender}}</h5>
                <h5>Report : {{result}}</h5>
            </div>
            <hr>
            <div class="mt-3">
                <button type="button" class="btn btn-warning w-100 fw-bold" data-bs-toggle="modal" data-bs-target="#chatModal" onclick="startChat()">
                    Chat with Medical AI Agent
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="chatModal" tabindex="-1" aria-labelledby="chatModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark text-white border-warning">
                <div class="modal-header border-warning">
                    <h5 class="modal-title" id="chatModalLabel text-warning">Medical AI Assistant</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="chatWindow" style="height: 400px; overflow-y: auto; padding: 10px; border: 1px solid #ffc107; border-radius: 5px; background: rgba(0,0,0,0.5);">
                        <div id="chatHistory"></div>
                        <div id="typingIndicator" class="text-muted" style="display: none;">AI is thinking...</div>
                    </div>
                    <div class="input-group mt-3">
                        <input type="text" id="userInput" class="form-control bg-dark text-white border-warning" placeholder="Ask a follow-up question...">
                        <button class="btn btn-warning" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .chat-bubble {
            border-radius: 15px;
            padding: 12px 18px;
            margin-bottom: 15px;
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .ai-bubble {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid #ffc107;
            border-bottom-left-radius: 2px;
            color: #fff;
        }
        .user-bubble {
            background: rgba(13, 202, 240, 0.1);
            border: 1px solid #0dcaf0;
            border-bottom-right-radius: 2px;
            margin-left: auto;
            color: #fff;
        }
        #chatWindow::-webkit-scrollbar { width: 6px; }
        #chatWindow::-webkit-scrollbar-thumb { background: #ffc107; border-radius: 10px; }
    </style>
    <script>
        let diagnosisContext = "{{disease}} - {{result}}";
        let messageHistory = [];
        
        function appendMessage(sender, text) {
            const chatHistory = document.getElementById('chatHistory');
            const msgDiv = document.createElement('div');
            const isAI = sender === 'AI Agent';
            msgDiv.className = `chat-bubble ${isAI ? 'ai-bubble' : 'user-bubble'}`;
            
            const htmlContent = isAI ? marked.parse(text) : text;
            msgDiv.innerHTML = `<strong>${sender}:</strong><br>${htmlContent}`;
            
            chatHistory.appendChild(msgDiv);
            document.getElementById('chatWindow').scrollTop = document.getElementById('chatWindow').scrollHeight;
        }

        function startChat() {
            if (document.getElementById('chatHistory').innerHTML === "") {
                document.getElementById('typingIndicator').style.display = 'block';
                fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ diagnosis: diagnosisContext })
                })
                .then(res => res.json())
                .then(data => {
                    document.getElementById('typingIndicator').style.display = 'none';
                    appendMessage('AI Agent', data.response);
                    messageHistory.push({ role: "assistant", content: data.response });
                });
            }
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const query = input.value.trim();
            if (query === "") return;

            appendMessage('You', query);
            messageHistory.push({ role: "user", content: query });
            input.value = "";
            document.getElementById('typingIndicator').style.display = 'block';

            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ diagnosis: diagnosisContext, messages: messageHistory })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('typingIndicator').style.display = 'none';
                appendMessage('AI Agent', data.response);
                messageHistory.push({ role: "assistant", content: data.response });
            });
        }
    </script>
    <script src="{{url_for('static',filename='jquery/jquery-3.6.4.min.js')}}" type="text/javascript"></script> 
    <script src="{{url_for('static',filename='popper/popper.min.js')}}" type="text/javascript"></script> 
    <script src="{{url_for('static',filename='bootstrap-5.3.0-alpha3-dist/js/bootstrap.min.js')}}" type="text/javascript"></script>
</body>
</html>
